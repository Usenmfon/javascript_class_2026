<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    form {
        display: flex;
        flex-direction: column;
        width: 200px;
        margin: 0 auto;
    }

    label {
        margin-top: 10px;
    }

    button {
        margin-top: 20px;
    }


    .card{
        border: solid red;
        height: auto;
        width: 300px;
        margin: 20px 20px;
    }

    .btnCard {
        border: solid green;
        height: 15%;
        display: flex;
        justify-content: right;
    }

    section {
        display: flex;
        justify-content: space-around;
        flex-wrap: wrap;
        
    }

    .delete, .edit{
        align-self: flex-end;
        background-color: red;
        cursor: pointer;
    }

    .edit{
        background-color: green;
    }
</style>

<body>
    
    <form action="">
        <label for="title">Title</label>
        <input type="text" name="title" id="title">

        <label for="description">Description</label>
        <input type="text" name="description" id="description">

        <label for="completed">Completed?</label>
        <input type="radio" id="completed" name="completed" value="true">True
        <input type="radio" id="completed" name="completed" value="false">False

        <button type="submit">Submit</button>
    </form>

    <script src="./app.js"></script>
</body>
</html>
